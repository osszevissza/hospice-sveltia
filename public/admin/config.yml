# yaml-language-server: $schema=https://unpkg.com/@sveltia/cms/schema/sveltia-cms.json

backend:
  name: github
  repo: osszevissza/hospice-sveltia
  branch: main
  base_url: https://sveltia-cms-auth.hospicecf-6sicp.workers.dev

media_folder: /static/
public_folder: /

collections:
  - name: tartalom
    label: Tartalom
    label_singular: Tartalom
    folder: /content
    fields:
      - { label: Cím, name: title, widget: string }
      - { label: Törzs, name: body, widget: richtext }
    index_file:
      fields:
        - { label: Cím, name: title }
        - { label: Törzs, name: body, widget: richtext }
  - name: galeria
    label: Galéria
    files:
      - label: Galéria oldal
        name: galeria
        file: /content/galeria/index.md

        fields:
          - { label: Cím, name: title, widget: string }
          - { label: Tartalom, name: body, widget: markdown }

    media_folder: /content/galeria/img
    public_folder: /galeria/img
