<!doctype html>
<html lang="{{ .Site.LanguageCode }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Title -->
  <title>{{ block "title" . }}{{ .Title }} – {{ .Site.Title }}{{ end }}</title>

  <!-- Description -->
  <meta name="description" content="{{ with .Params.description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">

  <!-- Canonical URL -->
  <link rel="canonical" href="{{ .Permalink }}">

  <!-- Open Graph (Facebook, Messenger stb.) -->
  <meta property="og:title" content="{{ .Title }}">
  <meta property="og:description" content="{{ with .Params.description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ .Permalink }}">
  <meta property="og:locale" content="hu_HU">
  <meta property="og:image" content="{{ "img/og.jpg" | absURL }}">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">

  <!-- Twitter preview -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="{{ .Title }}">
  <meta name="twitter:description" content="{{ with .Params.description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <meta name="twitter:image" content="{{ "img/og.jpg" | absURL }}">

  <!-- Theme color (mobil böngésző header szín) -->
  <meta name="theme-color" content="#2f5d9c">

  <!-- CSS -->
  <link rel="stylesheet" href="{{ "css/base.css" | relURL }}">
  <link rel="stylesheet" href="{{ "css/layout.css" | relURL }}">
  <link rel="stylesheet" href="{{ "css/components.css" | relURL }}">
  <link rel="stylesheet" href="{{ "css/utilities.css" | relURL }}">

  <link rel="stylesheet" href="{{ "fonts/SpartanMB/SpartanMB-Regular.css" | relURL }}">
  <link rel="stylesheet" href="{{ "fonts/GeneralSans/GeneralSans.css" | relURL }}">
  <link rel="stylesheet" href="{{ "fonts/Playfair/Playfair.css" | relURL }}">

  <!-- Favicons -->
  <link rel="apple-touch-icon" sizes="180x180" href="{{ "favicons/apple-touch-icon.png" | relURL }}">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ "favicons/favicon-32x32.png" | relURL }}">
  <link rel="icon" type="image/png" sizes="16x16" href="{{ "favicons/favicon-16x16.png" | relURL }}">
  <link rel="icon" href="{{ "favicons/favicon.ico" | relURL }}" type="image/x-icon">
  <link rel="manifest" href="{{ "favicons/site.webmanifest" | relURL }}">


</head>

  <body>
    <a class="skip-link" href="#main-content">Ugrás a tartalomra</a>

    {{ partial "header.html" . }}

    <main id="main-content">{{ block "main" . }}{{ end }}</main>
    {{ partial "footer.html" . }}

<a href="#main-content"
   id="scrollToTopBtn"
   class="scroll-to-top"
   aria-label="Vissza a tetejére">
  ↑
</a>

    <script src="{{ "js/gallery.js" | relURL }}" defer></script>
    <script src="{{ "js/scroll-top.js" | relURL }}" defer></script>
    <script data-goatcounter="https://osszevissza.goatcounter.com/count"
        async src="https://gc.zgo.at/count.js"></script>

  </body>
</html>
